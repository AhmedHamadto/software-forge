name: Sync version on release tag

on:
  push:
    tags:
      - 'v*'

jobs:
  sync-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update plugin.json
        run: |
          FILE=".claude-plugin/plugin.json"
          [ -f "$FILE" ] || exit 0
          jq --arg v "${{ steps.version.outputs.VERSION }}" \
            '.version = $v' "$FILE" > tmp.json && mv tmp.json "$FILE"

      - name: Update marketplace.json
        run: |
          FILE=".claude-plugin/marketplace.json"
          [ -f "$FILE" ] || exit 0
          jq --arg v "${{ steps.version.outputs.VERSION }}" \
            '.metadata.version = $v | (.plugins[]?.version = $v)' \
            "$FILE" > tmp.json && mv tmp.json "$FILE"

      - name: Update package.json
        run: |
          FILE="package.json"
          [ -f "$FILE" ] || exit 0
          jq --arg v "${{ steps.version.outputs.VERSION }}" \
            '.version = $v' "$FILE" > tmp.json && mv tmp.json "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: sync version to ${{ steps.version.outputs.VERSION }}"
          git push origin main
